<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORGE Backtester</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>

<div class="header">
    <h1>FORGE Backtester</h1>
    <span class="header-sub">Deterministic Strategy Simulation for APEX</span>
</div>

<nav class="nav">
    <button class="active" data-view="overview">Results</button>
    <button data-view="detail" id="detail-tab" style="display:none">Strategy Detail</button>
    <button data-view="comparison">Comparison</button>
    <button data-view="mytrades">My Trades</button>
</nav>

<!-- View 1: Results Overview -->
<div id="view-overview" class="view active">
    <div id="results-list"></div>
</div>

<!-- View 2: Strategy Detail -->
<div id="view-detail" class="view">
    <button class="back-btn" onclick="showView('overview')">&larr; Back</button>
    <div id="detail-content"></div>
</div>

<!-- View 3: Comparison -->
<div id="view-comparison" class="view">
    <div id="comparison-content"></div>
</div>

<!-- View 4: My Trades -->
<div id="view-mytrades" class="view">
    <div id="mytrades-content"></div>
</div>

<script src="/js/app.js"></script>

</body>
</html>
